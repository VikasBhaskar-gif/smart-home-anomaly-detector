version: "3.9"

services:
  mosquitto:
    image: eclipse-mosquitto:2.0
    container_name: smart-home-broker
    ports:
      - "1883:1883"
    volumes:
      - ./config/mosquitto.conf:/mosquitto/config/mosquitto.conf
      - mosquitto_data:/mosquitto/data
    restart: unless-stopped

volumes:
  mosquitto_data:
